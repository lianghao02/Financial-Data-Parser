<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="安全、快速、精準的金融資料轉換工具，支援 CSV 轉 Excel。">
    <meta name="author" content="LiangHao">
    <title>CSV 轉 Excel 工具 | LiangHao Dev</title>

    <!-- Favicon (Emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">

    <!-- XLSX Style (Fork of SheetJS with style support) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <!-- JSZip CDN (jsDelivr to avoid Tracking Prevention issues) -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)',
                        'primary-hover': 'var(--color-primary-hover)',
                        accent: 'var(--color-accent)',
                        bg: '#f4f6f9',
                        text: '#333333',
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --color-primary: #1E3A8A;
            --color-primary-hover: #1e40af;
            --color-accent: #38bdf8;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: none;
            /* Flex when active */
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-bg text-text font-sans min-h-screen flex flex-col md:flex-row p-5 gap-5">

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <div class="text-xl font-bold text-primary">處理中...</div>
        <div class="text-xl font-bold text-primary">轉換處理中...</div>
        <div class="text-sm text-gray-500">正在處理您的檔案，請稍候。</div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 flex justify-center items-center">
        <div
            class="container w-full max-w-[800px] bg-white rounded-xl shadow-[0_10px_25px_-5px_rgba(0,0,0,0.1),0_8px_10px_-6px_rgba(0,0,0,0.1)] p-6 md:p-10 transition-transform duration-300">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold text-primary mb-2 flex justify-center items-center gap-2">
                    <svg class="w-[1em] h-[1em] fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                        <path
                            d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 144-208 0c-35.3 0-64 28.7-64 64l0 144-48 0c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128zM200 352l16 0c22.1 0 40 17.9 40 40l0 8c0 8.8-7.2 16-16 16s-16-7.2-16-16l0-8c0-4.4-3.6-8-8-8l-16 0c-4.4 0-8 3.6-8 8l0 80c0 4.4 3.6 8 8 8l16 0c4.4 0 8-3.6 8-8l0-8c0-8.8 7.2-16 16-16s16 7.2 16 16l0 8c0 22.1-17.9 40-40 40l-16 0c-22.1 0-40-17.9-40-40l0-80c0-22.1 17.9-40 40-40zm133.1 0l34.9 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-34.9 0c-7.2 0-13.1 5.9-13.1 13.1c0 5.2 3 9.9 7.8 12l37.4 16.6c16.3 7.2 26.8 23.4 26.8 41.2c0 24.9-20.2 45.1-45.1 45.1L304 512c-8.8 0-16-7.2-16-16s7.2-16 16-16l42.9 0c7.2 0 13.1-5.9 13.1-13.1c0-5.2-3-9.9-7.8-12l-37.4-16.6c-16.3-7.2-26.8-23.4-26.8-41.2c0-24.9 20.2-45.1 45.1-45.1zm98.9 0c8.8 0 16 7.2 16 16l0 31.6c0 23 5.5 45.6 16 66c10.5-20.3 16-42.9 16-66l0-31.6c0-8.8 7.2-16 16-16s16 7.2 16 16l0 31.6c0 34.7-10.3 68.7-29.6 97.6l-5.1 7.7c-3 4.5-8 7.1-13.3 7.1s-10.3-2.7-13.3-7.1l-5.1-7.7c-19.3-28.9-29.6-62.9-29.6-97.6l0-31.6c0-8.8 7.2-16 16-16z" />
                    </svg>
                    CSV 轉 Excel 專業工具
                </h1>
                <p class="text-gray-500 text-base">安全、快速、精確的金融資料轉換方案</p>
            </header>

            <div class="upload-section">

            <div class="options-section mt-8">

                        <div

                    <label

                    <label

                        <input type="radio" name="export-mode" value="merged_single_sheet" class="hidden peer">
                        <div
                            class="radio-custom w-5 h-5 border-2 border-gray-300 rounded-full mr-3 relative peer-checked:border-accent peer-checked:after:content-[''] peer-checked:after:absolute peer-checked:after:top-1/2 peer-checked:after:left-1/2 peer-checked:after:-translate-x-1/2 peer-checked:after:-translate-y-1/2 peer-checked:after:w-2.5 peer-checked:after:h-2.5 peer-checked:after:bg-accent peer-checked:after:rounded-full transition-all">

            <div class="action-section mt-8">

    </main>

    <!-- Settings Panel (Side for Desktop, Bottom for Mobile) -->
    <aside class="w-full md:w-[320px] bg-white rounded-xl shadow-lg p-6 flex flex-col gap-6 h-fit md:sticky md:top-5">
        <h2 class="text-xl font-bold text-gray-800 border-b pb-2">⚙️ 功能設定</h2>

        <!-- Setting: Cell Type -->
        <div class="setting-item">

        <!-- Setting: Strip Currency -->

                <div
                    class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary">
                </div>

        </div>

        <!-- Setting: Custom Filename -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">匯出檔名設定</label>
            <input type="text" id="setting-custom-filename" placeholder="例如: 114年度報表"

            <p class="text-xs text-gray-500 mt-1">若未填寫，系統將根據模式自動命名</p>
        </div>

        <!-- Setting: Theme Color -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">主題顏色</label>
            <div class="flex items-center gap-2">
                <input type="color" id="setting-theme-color" value="#1E3A8A"
                    class="w-10 h-10 p-0 border-0 rounded cursor-pointer">
                <span id="theme-color-label" class="text-sm text-gray-600 font-mono">#1E3A8A</span>
            </div>
        </div>

        <div class="mt-auto pt-4 text-xs text-gray-400 text-center">
            Config-First & UI-Driven Design

    <script>
        const app = (function () {
            // 私有變數
            let dropZone, fileInput, fileListEl, convertBtn, loadingOverlay;
            let settingCellType, settingStripCurrency, settingSheetPrefix, settingThemeColor, themeColorLabel, settingCustomFilename;
            let clearAllBtn, fileListTitle;
            let filesToProcess = [];

            // 配置 (預設值由 HTML 結構決定，此處為狀態同步)
            const CONFIG = {
                cellType: 'text',
                stripCurrency: true,
                sheetPrefix: '',
                themeColor: '#1E3A8A',
                customFilename: ''
            };

            function init() {
                // DOM 元素初始化
                dropZone = document.getElementById("drop-zone");
                fileInput = document.getElementById("file-input");
                fileListEl = document.getElementById("file-list");
                convertBtn = document.getElementById("convert-btn");
                loadingOverlay = document.getElementById("loading-overlay");
                clearAllBtn = document.getElementById("clear-all-btn");
                fileListTitle = document.getElementById("file-list-title");

                // 設定面板元素
                settingCellType = document.getElementById("setting-cell-type");
                settingStripCurrency = document.getElementById("setting-strip-currency");
                settingSheetPrefix = document.getElementById("setting-sheet-prefix");
                settingThemeColor = document.getElementById("setting-theme-color");
                themeColorLabel = document.getElementById("theme-color-label");
                settingCustomFilename = document.getElementById("setting-custom-filename");

                setupEventListeners();
                setupSettingsListeners();
            }

            function setupEventListeners() {
                // 拖放事件
                dropZone.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    dropZone.classList.add("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.remove("border-gray-200", "bg-[#fafafa]");
                });

                dropZone.addEventListener("dragleave", () => {
                    dropZone.classList.remove("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.add("border-gray-200", "bg-[#fafafa]");
                });

                dropZone.addEventListener("drop", async (e) => {
                    e.preventDefault();
                    dropZone.classList.remove("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.add("border-gray-200", "bg-[#fafafa]");
                    
                    if (e.dataTransfer.items) {
                        try {
                            loadingOverlay.style.display = 'flex';
                            // 關鍵修正：同步捕捉所有 Entry 並儲存至穩定的陣列中，防止 DataTransferItem 被瀏覽器清除
                            const items = Array.from(e.dataTransfer.items);
                            const entries = items
                                .filter(item => item.kind === 'file')
                                .map(item => item.webkitGetAsEntry ? item.webkitGetAsEntry() : (item.getAsEntry ? item.getAsEntry() : null))
                                .filter(entry => entry !== null);

                            const files = await getAllFileEntries(entries);
                            await handleFiles(files);
                        } catch (err) {
                            console.error("⚠️ 資料夾掃描發生意外:", err);
                            alert("⚠️ 資料夾掃描發生錯誤：" + err.message);
                        } finally {
                            loadingOverlay.style.display = 'none';
                        }
                    } else {
                        handleFiles(Array.from(e.dataTransfer.files));
                    }
                });

                dropZone.addEventListener("click", () => {
                    fileInput.click();
                });

                fileInput.addEventListener("change", (e) => {
                    handleFiles(Array.from(e.target.files));
                    fileInput.value = "";
                });

                convertBtn.addEventListener("click", handleConvert);
                
                clearAllBtn.addEventListener("click", () => {
                    filesToProcess = [];
                    updateFileList();
                    updateConvertBtn();
                });
            }

            function setupSettingsListeners() {
                // 儲存格格式
                settingCellType.addEventListener("change", (e) => {
                    CONFIG.cellType = e.target.value;
                });

                // 移除金額符號
                settingStripCurrency.addEventListener("change", (e) => {
                    CONFIG.stripCurrency = e.target.checked;
                });

                // 分頁前綴
                settingSheetPrefix.addEventListener("input", (e) => {
                    CONFIG.sheetPrefix = e.target.value.trim();
                });

                // 主題顏色
                settingThemeColor.addEventListener("input", (e) => {
                    const color = e.target.value;
                    themeColorLabel.textContent = color;
                    document.documentElement.style.setProperty('--color-primary', color);
                    // 簡單生成一個較淺的 hover 色
                    document.documentElement.style.setProperty('--color-primary-hover', adjustColorOpacity(color, 0.9));
                    CONFIG.themeColor = color;
                });

                // 自訂檔名
                settingCustomFilename.addEventListener("input", (e) => {
                    CONFIG.customFilename = e.target.value.trim();
                });
            }

            // 輔助函式：調整顏色
            function adjustColorOpacity(hex, opacity) {
                return hex;
            }

            // 遞迴讀取 FileSystemEntry，支援資料夾拖曳
            async function scanFiles(entry) {
                return new Promise((resolve) => {
                    if (entry.isFile) {
                        entry.file((file) => {
                            resolve([file]);
                        }, (err) => {
                            console.warn("⚠️ 讀取實體檔案失敗:", err);
                            resolve([]);
                        });
                    } else if (entry.isDirectory) {
                        const dirReader = entry.createReader();
                        let allEntries = [];

                        function readNext() {
                            dirReader.readEntries(async (entries) => {
                                if (entries.length > 0) {
                                    for (let i = 0; i < entries.length; i++) {
                                        const subFiles = await scanFiles(entries[i]);
                                        allEntries.push(...subFiles);
                                    }
                                    readNext();
                                } else {
                                    resolve(allEntries);
                                }
                            }, (err) => {
                                console.warn("⚠️ 讀取資料夾失敗:", err);
                                resolve(allEntries);
                            });
                        }
                        readNext();
                    } else {
                        resolve([]);
                    }
                });
            }

            async function getAllFileEntries(entries) {
                let allFiles = [];
                for (const entry of entries) {
                    const files = await scanFiles(entry);
                    allFiles.push(...files);
                }
                return allFiles;
            }

            async function handleFiles(files) {
                let hasZip = false;
                for (let file of files) {
                    if (file.name.toLowerCase().endsWith('.zip')) {
                        hasZip = true;
                        break;
                    }
                }

                if (hasZip) {
                    loadingOverlay.style.display = 'flex';
                    // 讓 UI 更新有機會渲染
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                for (let file of files) {
                    try {
                        const ext = file.name.split('.').pop().toLowerCase();
                        if (['csv', 'xlsx', 'xls'].includes(ext)) {
                            if (!filesToProcess.some(f => f.name === file.name && f.size === file.size)) {
                                filesToProcess.push(file);
                            }
                        } else if (ext === 'zip') {
                            await processZipFile(file);
                        }
                    } catch (err) {
                        console.warn(`⚠️ 處理檔案 ${file.name} 時發生錯誤:`, err);
                    }
                }

                if (hasZip) {
                    loadingOverlay.style.display = 'none';
                }
                updateFileList();
                updateConvertBtn();
            }

            async function processZipFile(fileOrBlob) {
                try {
                    const zip = new JSZip();
                    const contents = await zip.loadAsync(fileOrBlob);

                    for (const filename of Object.keys(contents.files)) {
                        try {
                            const zipEntry = contents.files[filename];
                            // Skip directories
                            if (zipEntry.dir) continue;

                            // Skip hidden/macOS files
                            if (filename.includes('__MACOSX/') || filename.split('/').pop().startsWith('.')) continue;

                            const ext = filename.split('.').pop().toLowerCase();
                            if (['csv', 'xlsx', 'xls'].includes(ext)) {
                                const blob = await zipEntry.async("blob");
                                // Extract actual file name without path
                                const actualName = filename.split('/').pop();
                                const extractedFile = new File([blob], actualName, { type: blob.type || "application/octet-stream" });

                                // We check uniqueness based on size and name.
                                if (!filesToProcess.some(f => f.name === extractedFile.name && f.size === extractedFile.size)) {
                                    filesToProcess.push(extractedFile);
                                }
                            } else if (ext === 'zip') {
                                // Recursive unzip
                                const blob = await zipEntry.async("blob");
                                // Give it the original file name so the recursive depth logic doesn't break. 
                                await processZipFile(blob);
                            }
                        } catch (innerErr) {
                            console.warn(`⚠️ 解析 ZIP 內檔案 [${filename}] 時發生錯誤:`, innerErr);
                        }
                    }
                } catch (err) {
                    console.error("⚠️ 讀取 ZIP 檔案本身失敗:", err);
                }
            }

            function updateFileList() {
                fileListEl.innerHTML = "";
                
                if (filesToProcess.length > 0) {
                    clearAllBtn.classList.remove("hidden");
                    fileListTitle.classList.remove("hidden");
                } else {
                    clearAllBtn.classList.add("hidden");
                    fileListTitle.classList.add("hidden");
                }

                filesToProcess.forEach((file, index) => {
                    const item = document.createElement("div");
                    item.className = "file-item flex justify-between items-center p-3 mb-2 bg-gray-50 rounded-lg border border-gray-100 animate-fadeIn";
                    item.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <span class="text-xl">📄</span>
                            <div class="flex flex-col min-w-0">
                                <span class="text-sm font-semibold truncate text-gray-700">${file.name}</span>
                                <span class="text-xs text-gray-400">${formatSize(file.size)}</span>
                            </div>
                        </div>
                        <button class="remove-btn text-gray-400 hover:text-danger transition-colors p-1" onclick="app.removeFile(${index})" title="移除檔案">
                            <svg class="w-5 h-5 fill-current" viewBox="0 0 448 512"><path d="M135.2 17.7C135.2 12.1 139.7 7.6 145.3 7.6l157.4 0c5.6 0 10.1 4.5 10.1 10.1l0 7.5L448 25.2c13.3 0 24 10.7 24 24s-10.7 24-24 24l-31 0 0 384c0 35.3-28.7 64-64 64L95.2 512c-35.3 0-64-28.7-64-64l0-384L0 73.2c-13.3 0-24-10.7-24-24s10.7-24 24-24l112.8 0 0-7.5zM23.2 121.2L56.7 121.2 56.7 448c0 8.8 7.2 16 16 16l304 0c8.8 0 16-7.2 16-16l0-326.8 33.5 0c8.8 0 16-7.2 16-16s-7.2-16-16-16l-33.5 0 0-7.5c0-14.1-11.4-25.5-25.5-25.5L145.3 71.9c-14.1 0-25.5 11.4-25.5 25.5l0 7.5-33.5 0c-8.8 0-16 7.2-16 16s7.2 16 16 16z"/></svg>
                        </button>
                    `;
                    fileListEl.appendChild(item);
                });
            }

            function formatSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            function removeFile(index) {
                filesToProcess.splice(index, 1);
                updateFileList();
                updateConvertBtn();
            }

            function updateConvertBtn() {
                const count = filesToProcess.length;
                convertBtn.disabled = count === 0;
                convertBtn.textContent = count > 0 ? `立即轉檔 (${count} 個檔案)` : "立即轉檔";
            }

            function applyExcelCellFormatting(ws) {
                if (!ws || !ws['!ref']) return;
                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cell_address = { c: C, r: R };
                        const cell_ref = XLSX.utils.encode_cell(cell_address);
                        const cell = ws[cell_ref];

                        if (!cell) continue;

                        // 判斷儲存格格式
                        if (CONFIG.cellType === 'text') {
                            cell.t = 's'; // 強制為字串
                        } else if (CONFIG.cellType === 'number') {
                            if (typeof cell.v === 'string' && !isNaN(parseFloat(cell.v.replace(/[$,]/g, '')))) {
                                cell.t = 'n';
                                cell.v = parseFloat(cell.v.replace(/[$,]/g, ''));
                            }
                        }
                        // 'auto' 則保留 SheetJS 預設
                    }
                }
            }

            function applyGroupBorders(ws, dashboardRows) {
                if (!ws || !ws['!ref']) return;

                // 遍歷 dashboardRows 找到每個「【開戶人：...】」的區塊
                let groupStarts = [];
                for (let i = 0; i < dashboardRows.length; i++) {
                    const firstCol = dashboardRows[i][0];
                    if (typeof firstCol === 'string' && firstCol.startsWith('【開戶人：')) {
                        groupStarts.push(i);
                    }
                    if (typeof firstCol === 'string' && firstCol.startsWith('【原始資料】')) {
                        // 原始資料庫前結束
                        groupStarts.push(i);
                    }
                }

                // 針對每個區塊加外框 (排除原始資料庫區塊)
                for (let g = 0; g < groupStarts.length - 1; g++) {
                    const startRow = groupStarts[g];
                    const endRow = groupStarts[g+1] - 2; // 減去間隔空行
                    const maxCol = 6; // A 到 G (0 到 6)

                    for (let r = startRow; r <= endRow; r++) {
                        for (let c = 0; c <= maxCol; c++) {
                            const cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                            if (!ws[cellRef]) ws[cellRef] = { t: 's', v: '' };
                            const cell = ws[cellRef];
                            
                            if (!cell.s) cell.s = {};
                            if (!cell.s.border) cell.s.border = {};

                            const thick = { style: 'thick', color: { rgb: "000000" } };
                            
                            if (r === startRow) cell.s.border.top = thick;
                            if (r === endRow) cell.s.border.bottom = thick;
                            if (c === 0) cell.s.border.left = thick;
                            if (c === maxCol) cell.s.border.right = thick;
                        }
                    }
                }
            }

            async function handleConvert() {
                if (filesToProcess.length === 0) return;

                const mode = document.querySelector('input[name="export-mode"]:checked').value;
                const isLargeFile = filesToProcess.some(f => f.size > 50 * 1024 * 1024); // 50MB check

                convertBtn.disabled = true;

                if (isLargeFile) {
                    loadingOverlay.style.display = 'flex';
                } else {
                    convertBtn.textContent = "轉檔處理中...";
                }

                // 讓 UI 更新有機會渲染
                await new Promise(resolve => setTimeout(resolve, 100));

                try {
                    if (mode === "individual") {
                        await processIndividual(filesToProcess);
                    } else if (mode === "merged_sheets") {
                        await processMergedSheets(filesToProcess);
                    } else if (mode === "merged_single_sheet") {
                        await processMergedSingleSheet(filesToProcess);
                    }
                    alert("轉換完成！");
                } catch (error) {
                    console.error(error);
                    alert("⚠️ 轉換過程中發生錯誤：" + error.message);
                } finally {
                    convertBtn.disabled = false;
                    updateConvertBtn();
                    loadingOverlay.style.display = 'none';
                }
            }

            function readFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    const ext = file.name.split('.').pop().toLowerCase();

                    if (ext === 'csv') {
                        reader.onload = (e) => resolve({ type: 'csv', data: e.target.result });
                        reader.readAsText(file, "utf-8");
                    } else {
                        reader.onload = (e) => resolve({ type: 'excel', data: e.target.result });
                        reader.readAsArrayBuffer(file);
                    }
                    reader.onerror = (e) => reject(e);
                });
            }

            function parseData(fileData) {
                if (fileData.type === 'csv') {
                    return parseCSV(fileData.data);
                } else {
                    const wb = XLSX.read(fileData.data, { type: 'array' });
                    // 假設讀取第一個 Sheet
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    return XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
                }
            }

            function parseCSV(text) {
                // 更完善的 CSV 解析，支援處理引號內的逗號 (例如 "1,234.00")
                const rows = [];
                const lines = text.split(/\r?\n/);
                for (let line of lines) {
                    if (!line.trim()) continue;
                    const row = [];
                    let inQuotes = false;
                    let currentValue = '';
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            row.push(currentValue.trim().replace(/^"|"$/g, ""));
                            currentValue = '';
                        } else {
                            currentValue += char;
                        }
                    }
                    row.push(currentValue.trim().replace(/^"|"$/g, ""));
                    if (row.some(cell => cell !== "")) {
                        rows.push(row);
                    }
                }
                return rows;
            }

            function cleanData(rows) {
                if (!CONFIG.stripCurrency) return rows;

                return rows.map(row => {
                    return row.map(cell => {
                        if (typeof cell === 'string') {
                            // 移除 $ , + 符號，並處理 .00 或 .000
                            // 例如: "+1,234.00" -> "1234"
                            let cleaned = cell.replace(/[$,+]/g, '');
                            cleaned = cleaned.replace(/\.0+$/, '');
                            return cleaned;
                        }
                        return cell;
                    });
                });
            }

            function isAccountOpenerData(rows) {
                if (!rows || rows.length === 0) return false;
                const headers = rows[0];
                if (!Array.isArray(headers)) return false;

                // 根據圖片識別的關鍵字
                const targetHeaders = [
                    '身分證統一編號', '開戶行庫分行簡稱代碼', '存款種類',
                    '戶名', '帳號', '開戶日', '資料提供日'
                ];

                // 只要包含其中 4 個關鍵欄位就算符合
                let matchCount = 0;
                targetHeaders.forEach(target => {
                    if (headers.some(h => typeof h === 'string' && h.includes(target))) {
                        matchCount++;
                    }
                });

                return matchCount >= 4;
            }

            function generateAccountOpenerDashboard(allRows) {
                if (!allRows || allRows.length < 2) return allRows;

                const headers = allRows[0];
                const data = allRows.slice(1);

                // 尋找關鍵欄位索引 (不分大小寫或部分比對)
                const getIdx = (key) => headers.findIndex(h => typeof h === 'string' && h.includes(key));
                const idx = {
                    id: getIdx('身分證統一編號'),
                    bank: getIdx('開戶行庫分行簡稱代碼'),
                    type: getIdx('存款種類'),
                    currency: getIdx('幣別'),
                    name: getIdx('戶名'),
                    homePhone: getIdx('住家電話'),
                    cellPhone: getIdx('行動電話'),
                    resAddress: getIdx('戶籍地址'),
                    comAddress: getIdx('通訊地址'),
                    account: getIdx('帳號'),
                    balance: getIdx('帳戶餘額'), // 包含「資料提供日帳戶餘額」
                    openDate: getIdx('開戶日'),
                    infoDate: getIdx('資料提供日'),
                    branchCode: getIdx('開戶行總分支機構代碼') // 新增欄位
                };

                // 按身分證號分組
                const grouped = {};
                data.forEach(row => {
                    const id = row[idx.id] || '未知';
                    if (!grouped[id]) grouped[id] = [];
                    grouped[id].push(row);
                });

                let finalRows = [];

                // 針對每一位歸戶對象產生面板
                Object.keys(grouped).forEach(id => {
                    const personRows = grouped[id];
                    const firstRow = personRows[0];
                    const name = firstRow[idx.name] || '';

                    // 1. 標題與基本資訊
                    finalRows.push([`【開戶人：${name}】`]);
                    finalRows.push(['查詢身分證字號', id]);
                    finalRows.push(['資料類別', '欄位名稱', '資料內容']);
                    finalRows.push(['基本資料', '戶名', name]);
                    finalRows.push(['', '身分證統一編號', id]);
                    finalRows.push(['', '住家電話', firstRow[idx.homePhone] || '']);
                    finalRows.push(['', '行動電話', firstRow[idx.cellPhone] || '']);
                    finalRows.push(['聯絡地址', '戶籍地址', firstRow[idx.resAddress] || '']);
                    finalRows.push(['', '通訊地址', firstRow[idx.comAddress] || '']);
                    finalRows.push([]); // 空行

                    // 2. 名下帳戶表格
                    const branchCodeVal = firstRow[idx.branchCode] || '';
                    finalRows.push(['【名下帳戶】', '開戶行總分支機構代碼', branchCodeVal]);
                    finalRows.push(['銀行代碼', '帳號', '存款種類', '幣別', '帳戶餘額', '開戶日', '資料提供日']);
                    
                    personRows.forEach(row => {
                        finalRows.push([
                            row[idx.bank] || '',
                            row[idx.account] || '',
                            row[idx.type] || '',
                            row[idx.currency] || '',
                            row[idx.balance] || '',
                            row[idx.openDate] || '',
                            row[idx.infoDate] || ''
                        ]);
                    });
                    
                    finalRows.push([]); // 間隔
                    finalRows.push([]); // 間隔
                });

                // 4. 底部原始資料備查區
                finalRows.push(['【原始資料】']);
                finalRows.push(headers);
                finalRows = finalRows.concat(data);

                return finalRows;
            }

            async function processIndividual(files) {
                for (let i = 0; i < files.length; i++) {
                    try {
                        const file = files[i];
                        const fileData = await readFile(file);
                        const rows = await parseData(fileData);
                        const cleanedRows = cleanData(rows);

                        const wb = XLSX.utils.book_new();
                        const ws = XLSX.utils.aoa_to_sheet(cleanedRows);

                        applyExcelCellFormatting(ws);

                        XLSX.utils.book_append_sheet(wb, ws, "Sheet1");

                        let outName = file.name.replace(/\.(csv|xlsx|xls)$/i, ".xlsx");
                        if (CONFIG.customFilename) {
                            outName = `${CONFIG.customFilename}_${i + 1}.xlsx`;
                        }
                        XLSX.writeFile(wb, outName);
                    } catch (err) {
                        console.warn(`⚠️ 產出第 ${i+1} 個檔案時發生錯誤:`, err);
                    }
                }
            }

            async function processMergedSheets(files) {
                const wb = XLSX.utils.book_new();
                let accountOpenerRows = [];
                let regularFilesCount = 0;
                
                // 第一階段：預掃描所有檔案，建立「身分證號 -> 戶名」的對照表
                const idToNameMap = {};
                const allFileData = [];

                for (let i = 0; i < files.length; i++) {
                    try {
                        const file = files[i];
                        const fileData = await readFile(file);
                        const rows = await parseData(fileData);
                        const cleanedRows = cleanData(rows);
                        allFileData.push({ cleanedRows, file });

                        if (cleanedRows.length > 1) {
                            const headers = cleanedRows[0];
                            const nameIdx = headers.findIndex(h => typeof h === 'string' && (h.includes('戶名') || h.includes('姓名')));
                            const idIdx = headers.findIndex(h => typeof h === 'string' && (h.includes('身分證') || h.includes('證號')));
                            
                            if (nameIdx !== -1 && idIdx !== -1) {
                                cleanedRows.slice(1).forEach(row => {
                                    const id = String(row[idIdx] || '').trim();
                                    const name = String(row[nameIdx] || '').trim();
                                    if (id && name && !idToNameMap[id]) {
                                        idToNameMap[id] = name;
                                    }
                                });
                            }
                        }
                    } catch (err) {
                        console.warn(`⚠️ 預掃描檔案 ${files[i].name} 時發生錯誤:`, err);
                    }
                }

                // 第二階段：正式處理與分頁生成
                for (let i = 0; i < allFileData.length; i++) {
                    try {
                        const { cleanedRows, file } = allFileData[i];

                        if (isAccountOpenerData(cleanedRows)) {
                            if (accountOpenerRows.length === 0) {
                                accountOpenerRows = cleanedRows;
                            } else {
                                accountOpenerRows = accountOpenerRows.concat(cleanedRows.slice(1));
                            }
                            continue;
                        }

                        // 嘗試決定分頁名稱
                        const headers = cleanedRows[0];
                        const nameIdx = headers.findIndex(h => typeof h === 'string' && (h.includes('戶名') || h.includes('姓名')));
                        const idIdx = headers.findIndex(h => typeof h === 'string' && (h.includes('身分證') || h.includes('證號')));
                        
                        let nameFromData = "";
                        
                        // 1. 直接從檔案內容抓戶名
                        if (nameIdx !== -1 && cleanedRows.length > 1) {
                            nameFromData = String(cleanedRows[1][nameIdx]).trim();
                        }
                        
                        // 2. 如果沒戶名但有身分證，去對照表查
                        if (!nameFromData && idIdx !== -1 && cleanedRows.length > 1) {
                            const id = String(cleanedRows[1][idIdx]).trim();
                            if (idToNameMap[id]) {
                                nameFromData = idToNameMap[id];
                            }
                        }

                        let sheetName = "";
                        if (nameFromData) {
                            sheetName = nameFromData;
                        } else {
                            regularFilesCount++;
                            sheetName = regularFilesCount.toString().padStart(2, "0");
                        }

                        if (CONFIG.sheetPrefix) {
                            sheetName = CONFIG.sheetPrefix + sheetName;
                        }

                        // 移除 Excel 不允許的字元 (: \ / ? * [ ])
                        sheetName = sheetName.replace(/[:\\/?*\[\]]/g, "_");

                        // Sheet 名稱長度限制 31 字元
                        if (sheetName.length > 31) sheetName = sheetName.substring(0, 31);

                        // 避免重複 Sheet 名稱
                        let finalSheetName = sheetName;
                        let suffix = 1;
                        while (wb.SheetNames.includes(finalSheetName)) {
                            let suffixStr = `(${suffix})`;
                            finalSheetName = sheetName.substring(0, 31 - suffixStr.length) + suffixStr;
                            suffix++;
                        }

                        const ws = XLSX.utils.aoa_to_sheet(cleanedRows);
                        applyExcelCellFormatting(ws);
                        XLSX.utils.book_append_sheet(wb, ws, finalSheetName);
                    } catch (err) {
                        console.warn(`⚠️ 合併分頁 ${i+1} 時發生錯誤:`, err);
                    }
                }

                // 如果有收集到開戶資料，建立「開戶人」分頁並放到最前面
                if (accountOpenerRows.length > 0) {
                    // 轉換為 Dashboard 視覺佈局
                    const dashboardRows = generateAccountOpenerDashboard(accountOpenerRows);
                    const ws = XLSX.utils.aoa_to_sheet(dashboardRows);
                    
                    applyExcelCellFormatting(ws);
                    applyGroupBorders(ws, dashboardRows); // 加上粗外框線
                    
                    XLSX.utils.book_append_sheet(wb, ws, "開戶人");

                    // 調整順序，讓「開戶人」放在第一個分頁
                    const sheetNames = wb.SheetNames;
                    const lastSheet = sheetNames.pop();
                    sheetNames.unshift(lastSheet);
                    wb.SheetNames = sheetNames;
                }

                saveMergedFile(wb);
            }

            async function processMergedSingleSheet(files) {
                const wb = XLSX.utils.book_new();
                let combinedRows = [];
                let firstFileHeader = [];

                for (let i = 0; i < files.length; i++) {
                    try {
                        const file = files[i];
                        const fileData = await readFile(file);
                        const rows = await parseData(fileData);

                        if (rows.length === 0) continue;

                        let dataRows = [];

                        if (i === 0) {
                            // 第一個檔案：保留所有資料包含標題
                            dataRows = rows;
                            firstFileHeader = rows[0]; // 儲存第一筆標題列，以便後續比較
                        } else {
                            // 後續檔案：若有相同標題則移除
                            if (rows.length > 0) {
                                // 判斷方式：若第一列資料的長度、內容與 firstFileHeader 相似
                                if (JSON.stringify(rows[0]) === JSON.stringify(firstFileHeader)) {
                                    dataRows = rows.slice(1);
                                } else {
                                    dataRows = rows; // 如果標題不同（或無標題），直接合併
                                }
                            }
                        }

                        const cleanedRows = cleanData(dataRows);
                        combinedRows = combinedRows.concat(cleanedRows);
                    } catch (err) {
                        console.warn(`⚠️ 合併單頁 ${i+1} 時發生錯誤:`, err);
                    }
                }

                if (combinedRows.length > 0) {
                    const ws = XLSX.utils.aoa_to_sheet(combinedRows);
                    applyExcelCellFormatting(ws);
                    XLSX.utils.book_append_sheet(wb, ws, "合併彙總");
                    saveMergedFile(wb);
                }
            }

            function saveMergedFile(wb) {
                let filename = "";
                if (CONFIG.customFilename) {
                    filename = `${CONFIG.customFilename}.xlsx`;
                } else {
                    const now = new Date();
                    const month = (now.getMonth() + 1).toString().padStart(2, "0");
                    const date = now.getDate().toString().padStart(2, "0");
                    const hours = now.getHours().toString().padStart(2, "0");
                    const minutes = now.getMinutes().toString().padStart(2, "0");
                    filename = `${month}${date}_${hours}${minutes}合併金流.xlsx`;
                }

                XLSX.writeFile(wb, filename);
            }

            return { init, removeFile };
        })();

        document.addEventListener("DOMContentLoaded", app.init);
    </script>
