<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="安全、快速、精準的金融資料轉換工具，支援 CSV 轉 Excel。">
    <meta name="author" content="LiangHao">
    <title>CSV 轉 Excel 工具 | LiangHao Dev</title>

    <!-- SheetJS CDN -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)',
                        'primary-hover': 'var(--color-primary-hover)',
                        accent: 'var(--color-accent)',
                        bg: '#f4f6f9',
                        text: '#333333',
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --color-primary: #1E3A8A;
            --color-primary-hover: #1e40af;
            --color-accent: #38bdf8;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: none;
            /* Flex when active */
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-bg text-text font-sans min-h-screen flex flex-col md:flex-row p-5 gap-5">

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <div class="text-xl font-bold text-primary">處理中...</div>
        <div class="text-sm text-gray-500">正在處理大型檔案，請稍候</div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 flex justify-center items-center">
        <div
            class="container w-full max-w-[800px] bg-white rounded-xl shadow-[0_10px_25px_-5px_rgba(0,0,0,0.1),0_8px_10px_-6px_rgba(0,0,0,0.1)] p-6 md:p-10 transition-transform duration-300">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold text-primary mb-2 flex justify-center items-center gap-2">
                    <svg class="w-[1em] h-[1em] fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                        <path
                            d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 144-208 0c-35.3 0-64 28.7-64 64l0 144-48 0c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128zM200 352l16 0c22.1 0 40 17.9 40 40l0 8c0 8.8-7.2 16-16 16s-16-7.2-16-16l0-8c0-4.4-3.6-8-8-8l-16 0c-4.4 0-8 3.6-8 8l0 80c0 4.4 3.6 8 8 8l16 0c4.4 0 8-3.6 8-8l0-8c0-8.8 7.2-16 16-16s16 7.2 16 16l0 8c0 22.1-17.9 40-40 40l-16 0c-22.1 0-40-17.9-40-40l0-80c0-22.1 17.9-40 40-40zm133.1 0l34.9 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-34.9 0c-7.2 0-13.1 5.9-13.1 13.1c0 5.2 3 9.9 7.8 12l37.4 16.6c16.3 7.2 26.8 23.4 26.8 41.2c0 24.9-20.2 45.1-45.1 45.1L304 512c-8.8 0-16-7.2-16-16s7.2-16 16-16l42.9 0c7.2 0 13.1-5.9 13.1-13.1c0-5.2-3-9.9-7.8-12l-37.4-16.6c-16.3-7.2-26.8-23.4-26.8-41.2c0-24.9 20.2-45.1 45.1-45.1zm98.9 0c8.8 0 16 7.2 16 16l0 31.6c0 23 5.5 45.6 16 66c10.5-20.3 16-42.9 16-66l0-31.6c0-8.8 7.2-16 16-16s16 7.2 16 16l0 31.6c0 34.7-10.3 68.7-29.6 97.6l-5.1 7.7c-3 4.5-8 7.1-13.3 7.1s-10.3-2.7-13.3-7.1l-5.1-7.7c-19.3-28.9-29.6-62.9-29.6-97.6l0-31.6c0-8.8 7.2-16 16-16z" />
                    </svg>
                    CSV 轉 Excel 轉換器
                </h1>
                <p class="text-gray-500 text-base">安全、快速、精準的金融資料轉換工具</p>
            </header>

            <div class="upload-section">
                <!-- Drop Zone -->
                <div id="drop-zone"
                    class="drop-zone border-2 border-dashed border-gray-200 rounded-xl py-10 px-5 text-center cursor-pointer transition-all duration-300 bg-[#fafafa] hover:border-accent hover:bg-[#eef2ff] group">
                    <div class="icon text-5xl mb-4 text-[#333333] group-hover:text-primary transition-colors">
                        <svg class="w-[1em] h-[1em] fill-current inline-block" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 576 512">
                            <path
                                d="M88.7 223.8L0 375.8 0 96C0 60.7 28.7 32 64 32l117.5 0c17 0 33.3 6.7 45.3 18.7l26.5 26.5c12 12 28.3 18.7 45.3 18.7L416 96c35.3 0 64 28.7 64 64l0 32-336 0c-22.8 0-43.8 12.1-55.3 31.8zm27.6 16.1C122.1 230 132.6 224 144 224l400 0c11.5 0 22 6.1 27.7 16.1s5.7 22.2-.1 32.1l-112 192C453.9 474 443.4 480 432 480L32 480c-11.5 0-22-6.1-27.7-16.1s-5.7-22.2 .1-32.1l112-192z" />
                        </svg>
                    </div>
                    <p class="text-gray-500 font-medium">拖放 CSV 檔案至此，或點擊選擇檔案</p>
                    <input type="file" id="file-input" multiple accept=".csv" hidden>
                </div>
                <!-- File List -->
                <div id="file-list" class="file-list mt-5 max-h-[150px] overflow-y-auto"></div>
            </div>

            <div class="options-section mt-8">
                <h2 class="text-lg font-bold mb-4 text-primary">匯出模式</h2>
                <div class="radio-group flex flex-col gap-3">
                    <label
                        class="radio-option flex items-center cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all duration-200 select-none">
                        <input type="radio" name="export-mode" value="individual" checked class="hidden peer">
                        <div
                            class="radio-custom w-5 h-5 border-2 border-gray-300 rounded-full mr-3 relative peer-checked:border-accent peer-checked:after:content-[''] peer-checked:after:absolute peer-checked:after:top-1/2 peer-checked:after:left-1/2 peer-checked:after:-translate-x-1/2 peer-checked:after:-translate-y-1/2 peer-checked:after:w-2.5 peer-checked:after:h-2.5 peer-checked:after:bg-accent peer-checked:after:rounded-full transition-all">
                        </div>
                        <span
                            class="label-text text-gray-600 font-medium peer-checked:text-accent peer-checked:font-semibold">個別儲存
                            (原檔名)</span>
                    </label>
                    <label
                        class="radio-option flex items-center cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all duration-200 select-none">
                        <input type="radio" name="export-mode" value="merged" class="hidden peer">
                        <div
                            class="radio-custom w-5 h-5 border-2 border-gray-300 rounded-full mr-3 relative peer-checked:border-accent peer-checked:after:content-[''] peer-checked:after:absolute peer-checked:after:top-1/2 peer-checked:after:left-1/2 peer-checked:after:-translate-x-1/2 peer-checked:after:-translate-y-1/2 peer-checked:after:w-2.5 peer-checked:after:h-2.5 peer-checked:after:bg-accent peer-checked:after:rounded-full transition-all">
                        </div>
                        <span
                            class="label-text text-gray-600 font-medium peer-checked:text-accent peer-checked:font-semibold">合併儲存

                </div>
            </div>

            <div class="action-section mt-8">
                <button id="convert-btn" disabled
                    class="w-full py-3 px-5 bg-primary text-white border-none rounded-xl text-base font-semibold cursor-pointer transition-colors duration-300 hover:bg-primary-hover disabled:bg-gray-400 disabled:cursor-not-allowed">開始轉換</button>
            </div>

            <footer class="mt-10 text-center text-slate-500 text-sm pt-5 border-t border-slate-200">
                <p>&copy; 2025 CSV to Excel Tool. (FDP v1.1.0)</p>
            </footer>

    </main>

    <!-- Settings Panel (Side for Desktop, Bottom for Mobile) -->
    <aside class="w-full md:w-[320px] bg-white rounded-xl shadow-lg p-6 flex flex-col gap-6 h-fit md:sticky md:top-5">
        <h2 class="text-xl font-bold text-gray-800 border-b pb-2">⚙️ 設定面板</h2>

        <!-- Setting: Cell Type -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">儲存格格式</label>
            <select id="setting-cell-type"
                class="w-full p-2 border border-gray-300 rounded-md focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm">
                <option value="text" selected>文字 (保留前導零)</option>
                <option value="number">數值 (自動轉換)</option>
                <option value="auto">自動偵測</option>
            </select>
            <p class="text-xs text-gray-500 mt-1">控制轉檔後的 Excel 欄位屬性</p>
        </div>

        <!-- Setting: Strip Currency -->
        <div class="setting-item flex items-center justify-between">
            <div class="flex flex-col">
                <label class="text-sm font-semibold text-gray-700">移除金額符號</label>
                <p class="text-xs text-gray-500">自動移除 $ , + .00</p>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="setting-strip-currency" class="sr-only peer" checked>
                <div
                    class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary">
                </div>
            </label>
        </div>

        <!-- Setting: Sheet Prefix -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">合併分頁前綴</label>
            <input type="text" id="setting-sheet-prefix" placeholder="例如: Data_"
                class="w-full p-2 border border-gray-300 rounded-md focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm">
            <p class="text-xs text-gray-500 mt-1">選填，預設為 01, 02...</p>
        </div>

        <!-- Setting: Theme Color -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">主題顏色</label>
            <div class="flex items-center gap-2">
                <input type="color" id="setting-theme-color" value="#1E3A8A"
                    class="w-10 h-10 p-0 border-0 rounded cursor-pointer">
                <span id="theme-color-label" class="text-sm text-gray-600 font-mono">#1E3A8A</span>
            </div>
        </div>

        <div class="mt-auto pt-4 text-xs text-gray-400 text-center">
            Config-First & UI-Driven Design
        </div>
    </aside>

    <script>
        const app = (function () {
            // 私有變數
            let dropZone, fileInput, fileListEl, convertBtn, loadingOverlay;
            let settingCellType, settingStripCurrency, settingSheetPrefix, settingThemeColor, themeColorLabel;
            let filesToProcess = [];

            // 配置 (預設值由 HTML 結構決定，此處為狀態同步)
            const CONFIG = {
                cellType: 'text',
                stripCurrency: true,
                sheetPrefix: '',
                themeColor: '#1E3A8A'
            };

            function init() {
                // DOM 元素初始化
                dropZone = document.getElementById("drop-zone");
                fileInput = document.getElementById("file-input");
                fileListEl = document.getElementById("file-list");
                convertBtn = document.getElementById("convert-btn");
                loadingOverlay = document.getElementById("loading-overlay");

                // 設定面板元素
                settingCellType = document.getElementById("setting-cell-type");
                settingStripCurrency = document.getElementById("setting-strip-currency");
                settingSheetPrefix = document.getElementById("setting-sheet-prefix");
                settingThemeColor = document.getElementById("setting-theme-color");
                themeColorLabel = document.getElementById("theme-color-label");

                setupEventListeners();
                setupSettingsListeners();
            }

            function setupEventListeners() {
                // 拖放事件
                dropZone.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    dropZone.classList.add("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.remove("border-gray-200", "bg-[#fafafa]");
                });

                dropZone.addEventListener("dragleave", () => {
                    dropZone.classList.remove("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.add("border-gray-200", "bg-[#fafafa]");
                });

                dropZone.addEventListener("drop", (e) => {
                    e.preventDefault();
                    dropZone.classList.remove("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.add("border-gray-200", "bg-[#fafafa]");
                    handleFiles(e.dataTransfer.files);
                });

                dropZone.addEventListener("click", () => {
                    fileInput.click();
                });

                fileInput.addEventListener("change", (e) => {
                    handleFiles(e.target.files);
                    fileInput.value = "";
                });

                convertBtn.addEventListener("click", handleConvert);
            }

            function setupSettingsListeners() {
                // 儲存格格式
                settingCellType.addEventListener("change", (e) => {
                    CONFIG.cellType = e.target.value;
                });

                // 移除金額符號
                settingStripCurrency.addEventListener("change", (e) => {
                    CONFIG.stripCurrency = e.target.checked;
                });

                // 分頁前綴
                settingSheetPrefix.addEventListener("input", (e) => {
                    CONFIG.sheetPrefix = e.target.value.trim();
                });

                // 主題顏色
                settingThemeColor.addEventListener("input", (e) => {
                    const color = e.target.value;
                    themeColorLabel.textContent = color;
                    document.documentElement.style.setProperty('--color-primary', color);
                    // 簡單生成一個較淺的 hover 色
                    document.documentElement.style.setProperty('--color-primary-hover', adjustColorOpacity(color, 0.9));
                    CONFIG.themeColor = color;
                });
            }

            // 輔助函式：調整顏色 (此處僅為 placeholder，實際可使用庫或簡單算法)
            function adjustColorOpacity(hex, opacity) {
                // 這裡簡單回傳原色，僅作示範。若需變亮可實作 HEX 轉 RGB 邏輯
                return hex;
            }

            function handleFiles(files) {
                for (let file of files) {
                    if (file.name.toLowerCase().endsWith(".csv")) {
                        if (!filesToProcess.some(f => f.name === file.name && f.size === file.size)) {
                            filesToProcess.push(file);
                        }
                    }
                }
                updateFileList();
                updateConvertBtn();
            }

            function updateFileList() {
                fileListEl.innerHTML = "";
                filesToProcess.forEach((file, index) => {
                    const item = document.createElement("div");
                    item.className = "flex justify-between items-center p-3 bg-gray-50 rounded-lg mb-2 text-sm border border-gray-200";
                    item.innerHTML = `
                        <span>${file.name} <span class="text-xs text-gray-400">(${formatSize(file.size)})</span></span>
                        <span class="remove-btn text-danger font-bold cursor-pointer ml-2 hover:opacity-80 transition-opacity px-2">×</span>
                    `;
                    item.querySelector(".remove-btn").addEventListener("click", (e) => {
                        e.stopPropagation(); // 防止冒泡觸發 dropZone click
                        removeFile(index);
                    });
                    fileListEl.appendChild(item);
                });
            }

            function formatSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            function removeFile(index) {
                filesToProcess.splice(index, 1);
                updateFileList();
                updateConvertBtn();
            }

            function updateConvertBtn() {
                convertBtn.disabled = filesToProcess.length === 0;
                convertBtn.textContent = filesToProcess.length === 0
                    ? "開始轉換"
                    : `轉換 ${filesToProcess.length} 個檔案`;
            }

            /**
             * 根據設定與內容格式化工作表
             */
            function applyExcelCellFormatting(ws) {
                if (!ws["!ref"]) return;

                // 若設定為「自動」，則不強制全部轉文字，僅由 SheetJS 預設處理 (通常會自動判斷)
                // 若設定為「數值」，也不強制，讓 SheetJS 處理
                // 若設定為「文字」，則強制轉文字

                if (CONFIG.cellType === 'text') {
                    const range = XLSX.utils.decode_range(ws["!ref"]);
                    for (let R = range.s.r; R <= range.e.r; ++R) {
                        for (let C = range.s.c; C <= range.e.c; ++C) {
                            const cell_address = XLSX.utils.encode_cell({ r: R, c: C });
                            if (!ws[cell_address]) continue;
                            ws[cell_address].t = "s";
                            ws[cell_address].z = "@";
                        }
                    }
                }
            }

            async function handleConvert() {
                if (filesToProcess.length === 0) return;

                const mode = document.querySelector('input[name="export-mode"]:checked').value;
                const isLargeFile = filesToProcess.some(f => f.size > 50 * 1024 * 1024); // 50MB check

                convertBtn.disabled = true;

                if (isLargeFile) {
                    loadingOverlay.style.display = 'flex';
                } else {
                    convertBtn.textContent = "處理中...";
                }

                // 讓 UI 更新有機會渲染
                await new Promise(resolve => setTimeout(resolve, 100));

                try {
                    if (mode === "individual") {
                        await processIndividual(filesToProcess);
                    } else {
                        await processMerged(filesToProcess);
                    }
                    alert("轉換完成！");
                } catch (error) {
                    console.error(error);
                    alert("⚠️ 轉換過程中發生錯誤：" + error.message);
                } finally {
                    convertBtn.disabled = false;
                    updateConvertBtn();
                    loadingOverlay.style.display = 'none';
                }
            }

            function readCSV(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(e);
                    reader.readAsText(file, "utf-8"); // 假設 UTF-8，若有 big5 需求需另外處理
                });
            }

            function parseCSV(text) {
                const rows = [];
                let currentRow = [];
                let currentCell = "";
                let inQuotes = false;

                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];

                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            currentCell += '"';
                            i++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === "," && !inQuotes) {
                        currentRow.push(currentCell.trim());
                        currentCell = "";
                    } else if ((char === "\r" || char === "\n") && !inQuotes) {
                        if (char === "\r" && nextChar === "\n") i++;
                        if (currentCell || currentRow.length > 0) {
                            currentRow.push(currentCell.trim());
                            rows.push(currentRow);
                        }
                        currentRow = [];
                        currentCell = "";
                    } else {
                        currentCell += char;
                    }
                }
                if (currentCell || currentRow.length > 0) {
                    currentRow.push(currentCell.trim());
                    rows.push(currentRow);
                }
                return rows;
            }

            function cleanData(rows) {
                return rows.map((row) => {
                    return row.map((cell) => {
                        let val = cell;

                        if (CONFIG.stripCurrency) {
                            // 移除金額符號 (+, $, .00)
                            // 規則：若是金錢格式 (e.g. +123.00, $456, 789.00)

                            // 1. 移除 .00 結尾
                            if (/\.00$/.test(val)) {
                                val = val.substring(0, val.length - 3);
                            }

                            // 2. 移除 + 號 (若為純數字)
                            // 避免移除電話號碼的 +886
                            // 邏輯：若 +號後是數字，且非電話格式 (這裡簡化處理，遵循 Constitution: 金額清理)
                            // 原規則：移除 + 正號，但保留 0081... 
                            // 這裡只針對單純的數值符號處理

                            if (val.startsWith('+')) {
                                // 判斷是否為金額或數值
                                const rest = val.substring(1);
                                if (!isNaN(Number(rest))) {
                                    val = rest;
                                }
                            }

                            // 3. 移除 $ 號
                            if (val.startsWith('$')) {
                                val = val.substring(1);
                            }
                        }

                        // 若設定為數值優先，嘗試轉型
                        if (CONFIG.cellType === 'number') {
                            if (!isNaN(Number(val)) && val.trim() !== '') {
                                return Number(val);
                            }
                        }

                        return val;
                    });
                });
            }

            async function processIndividual(files) {
                for (let file of files) {
                    const text = await readCSV(file);
                    const rows = parseCSV(text);
                    const cleanedRows = cleanData(rows);

                    const wb = XLSX.utils.book_new();
                    const ws = XLSX.utils.aoa_to_sheet(cleanedRows);

                    applyExcelCellFormatting(ws);

                    XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
                    XLSX.writeFile(wb, file.name.replace(/\.csv$/i, ".xlsx"));
                }
            }

            async function processMerged(files) {
                const wb = XLSX.utils.book_new();

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const text = await readCSV(file);
                    const rows = parseCSV(text);
                    const cleanedRows = cleanData(rows);

                    const ws = XLSX.utils.aoa_to_sheet(cleanedRows);

                    applyExcelCellFormatting(ws);

                    let sheetName = (i + 1).toString().padStart(2, "0");
                    if (CONFIG.sheetPrefix) {
                        sheetName = CONFIG.sheetPrefix + sheetName;
                    }

                    // Sheet 名稱長度限制 31 字元
                    if (sheetName.length > 31) sheetName = sheetName.substring(0, 31);

                    // 避免重複 Sheet 名稱
                    if (wb.SheetNames.includes(sheetName)) {
                        sheetName = sheetName + "_" + i;
                    }

                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                }

                const now = new Date();
                const month = (now.getMonth() + 1).toString().padStart(2, "0");
                const date = now.getDate().toString().padStart(2, "0");
                const hours = now.getHours().toString().padStart(2, "0");
                const minutes = now.getMinutes().toString().padStart(2, "0");
                const filename = `${month}${date}_${hours}${minutes}合併金流.xlsx`;

                XLSX.writeFile(wb, filename);
            }

            return { init };
        })();

        document.addEventListener("DOMContentLoaded", app.init);
    </script>
</body>

</html>
