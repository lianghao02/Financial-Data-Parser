<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="安全、快速、精準的金融資料轉換工具，支援 CSV 轉 Excel。">
    <meta name="author" content="LiangHao">
    <title>CSV 轉 Excel 工具 | LiangHao Dev</title>

    <!-- Favicon (Emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">

    <!-- SheetJS CDN -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- JSZip CDN (jsDelivr to avoid Tracking Prevention issues) -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)',
                        'primary-hover': 'var(--color-primary-hover)',
                        accent: 'var(--color-accent)',
                        bg: '#f4f6f9',
                        text: '#333333',
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --color-primary: #1E3A8A;
            --color-primary-hover: #1e40af;
            --color-accent: #38bdf8;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: none;
            /* Flex when active */
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-bg text-text font-sans min-h-screen flex flex-col md:flex-row p-5 gap-5">

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <div class="text-xl font-bold text-primary">處理中...</div>
        <div class="text-sm text-gray-500">正在處理大型檔案，請稍候</div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 flex justify-center items-center">
        <div
            class="container w-full max-w-[800px] bg-white rounded-xl shadow-[0_10px_25px_-5px_rgba(0,0,0,0.1),0_8px_10px_-6px_rgba(0,0,0,0.1)] p-6 md:p-10 transition-transform duration-300">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold text-primary mb-2 flex justify-center items-center gap-2">
                    <svg class="w-[1em] h-[1em] fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                        <path
                            d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 144-208 0c-35.3 0-64 28.7-64 64l0 144-48 0c-35.3 0-64-28.7-64-64L0 64zm384 64l-128 0L256 0 384 128zM200 352l16 0c22.1 0 40 17.9 40 40l0 8c0 8.8-7.2 16-16 16s-16-7.2-16-16l0-8c0-4.4-3.6-8-8-8l-16 0c-4.4 0-8 3.6-8 8l0 80c0 4.4 3.6 8 8 8l16 0c4.4 0 8-3.6 8-8l0-8c0-8.8 7.2-16 16-16s16 7.2 16 16l0 8c0 22.1-17.9 40-40 40l-16 0c-22.1 0-40-17.9-40-40l0-80c0-22.1 17.9-40 40-40zm133.1 0l34.9 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-34.9 0c-7.2 0-13.1 5.9-13.1 13.1c0 5.2 3 9.9 7.8 12l37.4 16.6c16.3 7.2 26.8 23.4 26.8 41.2c0 24.9-20.2 45.1-45.1 45.1L304 512c-8.8 0-16-7.2-16-16s7.2-16 16-16l42.9 0c7.2 0 13.1-5.9 13.1-13.1c0-5.2-3-9.9-7.8-12l-37.4-16.6c-16.3-7.2-26.8-23.4-26.8-41.2c0-24.9 20.2-45.1 45.1-45.1zm98.9 0c8.8 0 16 7.2 16 16l0 31.6c0 23 5.5 45.6 16 66c10.5-20.3 16-42.9 16-66l0-31.6c0-8.8 7.2-16 16-16s16 7.2 16 16l0 31.6c0 34.7-10.3 68.7-29.6 97.6l-5.1 7.7c-3 4.5-8 7.1-13.3 7.1s-10.3-2.7-13.3-7.1l-5.1-7.7c-19.3-28.9-29.6-62.9-29.6-97.6l0-31.6c0-8.8 7.2-16 16-16z" />
                    </svg>
                    CSV 轉 Excel 轉換器
                </h1>
                <p class="text-gray-500 text-base">安全、快速、精準的金融資料轉換工具</p>
            </header>

            <div class="upload-section">
                <!-- Drop Zone -->
                <div id="drop-zone"
                    class="drop-zone border-2 border-dashed border-gray-200 rounded-xl py-10 px-5 text-center cursor-pointer transition-all duration-300 bg-[#fafafa] hover:border-accent hover:bg-[#eef2ff] group">
                    <div class="icon text-5xl mb-4 text-[#333333] group-hover:text-primary transition-colors">
                        <svg class="w-[1em] h-[1em] fill-current inline-block" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 576 512">
                            <path
                                d="M88.7 223.8L0 375.8 0 96C0 60.7 28.7 32 64 32l117.5 0c17 0 33.3 6.7 45.3 18.7l26.5 26.5c12 12 28.3 18.7 45.3 18.7L416 96c35.3 0 64 28.7 64 64l0 32-336 0c-22.8 0-43.8 12.1-55.3 31.8zm27.6 16.1C122.1 230 132.6 224 144 224l400 0c11.5 0 22 6.1 27.7 16.1s5.7 22.2-.1 32.1l-112 192C453.9 474 443.4 480 432 480L32 480c-11.5 0-22-6.1-27.7-16.1s-5.7-22.2 .1-32.1l112-192z" />
                        </svg>
                    </div>
                    <p class="text-gray-500 font-medium">拖放檔案至此，或點擊選擇 (.csv, .xlsx, .xls, .zip)</p>
                    <input type="file" id="file-input" multiple accept=".csv, .xlsx, .xls, .zip" hidden>
                </div>
                <!-- File List Area -->
                <div class="file-list-container mt-6">
                    <div class="flex justify-between items-center mb-2 px-1">
                        <h2 id="file-list-title" class="text-sm font-bold text-gray-700 hidden">待處理檔案</h2>

                    <div id="file-list" class="file-list max-h-[150px] overflow-y-auto border-0 border-gray-100 rounded-lg bg-transparent"></div>
                </div>
            </div>

            <div class="options-section mt-8">
                <h2 class="text-lg font-bold mb-4 text-primary">匯出模式</h2>
                <div class="radio-group flex flex-col gap-3">
                    <label
                        class="radio-option flex items-center cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all duration-200 select-none">
                        <input type="radio" name="export-mode" value="individual" checked class="hidden peer">
                        <div
                            class="radio-custom w-5 h-5 border-2 border-gray-300 rounded-full mr-3 relative peer-checked:border-accent peer-checked:after:content-[''] peer-checked:after:absolute peer-checked:after:top-1/2 peer-checked:after:left-1/2 peer-checked:after:-translate-x-1/2 peer-checked:after:-translate-y-1/2 peer-checked:after:w-2.5 peer-checked:after:h-2.5 peer-checked:after:bg-accent peer-checked:after:rounded-full transition-all">
                        </div>
                        <span
                            class="label-text text-gray-600 font-medium peer-checked:text-accent peer-checked:font-semibold">個別儲存
                            (原檔名)</span>
                    </label>
                    <label
                        class="radio-option flex items-center cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all duration-200 select-none">
                        <input type="radio" name="export-mode" value="merged_sheets" class="hidden peer">
                        <div
                            class="radio-custom w-5 h-5 border-2 border-gray-300 rounded-full mr-3 relative peer-checked:border-accent peer-checked:after:content-[''] peer-checked:after:absolute peer-checked:after:top-1/2 peer-checked:after:left-1/2 peer-checked:after:-translate-x-1/2 peer-checked:after:-translate-y-1/2 peer-checked:after:w-2.5 peer-checked:after:h-2.5 peer-checked:after:bg-accent peer-checked:after:rounded-full transition-all">
                        </div>
                        <span
                            class="label-text text-gray-600 font-medium peer-checked:text-accent peer-checked:font-semibold">分頁合併
                            (不同分頁 01, 02...)</span>
                    </label>
                    <label
                        class="radio-option flex items-center cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all duration-200 select-none">
                        <input type="radio" name="export-mode" value="merged_single_sheet" class="hidden peer">
                        <div
                            class="radio-custom w-5 h-5 border-2 border-gray-300 rounded-full mr-3 relative peer-checked:border-accent peer-checked:after:content-[''] peer-checked:after:absolute peer-checked:after:top-1/2 peer-checked:after:left-1/2 peer-checked:after:-translate-x-1/2 peer-checked:after:-translate-y-1/2 peer-checked:after:w-2.5 peer-checked:after:h-2.5 peer-checked:after:bg-accent peer-checked:after:rounded-full transition-all">
                        </div>
                        <span
                            class="label-text text-gray-600 font-medium peer-checked:text-accent peer-checked:font-semibold">單頁合併
                            (垂直堆疊，略過重複標題)</span>
                    </label>
                </div>
            </div>

            <div class="action-section mt-8">
                <button id="convert-btn" disabled
                    class="w-full py-3 px-5 bg-primary text-white border-none rounded-xl text-base font-semibold cursor-pointer transition-colors duration-300 hover:bg-primary-hover disabled:bg-gray-400 disabled:cursor-not-allowed">開始轉換</button>
            </div>

            <footer class="mt-10 text-center text-slate-500 text-sm pt-5 border-t border-slate-200">
                <p>&copy; 2025 CSV to Excel Tool. (FDP v1.3.0)</p>
            </footer>
        </div>
    </main>

    <!-- Settings Panel (Side for Desktop, Bottom for Mobile) -->
    <aside class="w-full md:w-[320px] bg-white rounded-xl shadow-lg p-6 flex flex-col gap-6 h-fit md:sticky md:top-5">
        <h2 class="text-xl font-bold text-gray-800 border-b pb-2">⚙️ 設定面板</h2>

        <!-- Setting: Cell Type -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">儲存格格式</label>
            <select id="setting-cell-type"
                class="w-full p-2 border border-gray-300 rounded-md focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm">
                <option value="text" selected>文字 (保留前導零)</option>
                <option value="number">數值 (自動轉換)</option>
                <option value="auto">自動偵測</option>
            </select>
            <p class="text-xs text-gray-500 mt-1">控制轉檔後的 Excel 欄位屬性</p>
        </div>

        <!-- Setting: Strip Currency -->
        <div class="setting-item flex items-center justify-between">
            <div class="flex flex-col">
                <label class="text-sm font-semibold text-gray-700">移除金額符號</label>
                <p class="text-xs text-gray-500">自動移除 $ , + .00</p>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="setting-strip-currency" class="sr-only peer" checked>
                <div
                    class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary">
                </div>
            </label>
        </div>

        <!-- Setting: Sheet Prefix -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">合併分頁前綴</label>
            <input type="text" id="setting-sheet-prefix" placeholder="例如: Data_"
                class="w-full p-2 border border-gray-300 rounded-md focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm">
            <p class="text-xs text-gray-500 mt-1">選填，預設為 01, 02...</p>
        </div>

        <!-- Setting: Custom Filename -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">自訂輸出檔名</label>
            <input type="text" id="setting-custom-filename" placeholder="選填，例如: 測試報表"
                class="w-full p-2 border border-gray-300 rounded-md focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm">
            <p class="text-xs text-gray-500 mt-1">選填，若有填寫將以此命名匯出檔案</p>
        </div>

        <!-- Setting: Theme Color -->
        <div class="setting-item">
            <label class="block text-sm font-semibold text-gray-700 mb-2">主題顏色</label>
            <div class="flex items-center gap-2">
                <input type="color" id="setting-theme-color" value="#1E3A8A"
                    class="w-10 h-10 p-0 border-0 rounded cursor-pointer">
                <span id="theme-color-label" class="text-sm text-gray-600 font-mono">#1E3A8A</span>
            </div>
        </div>

        <div class="mt-auto pt-4 text-xs text-gray-400 text-center">
            Config-First & UI-Driven Design
        </div>
    </aside>

    <script>
        const app = (function () {
            // 私有變數
            let dropZone, fileInput, fileListEl, convertBtn, loadingOverlay;
            let settingCellType, settingStripCurrency, settingSheetPrefix, settingThemeColor, themeColorLabel, settingCustomFilename;
            let clearAllBtn, fileListTitle;
            let filesToProcess = [];

            // 配置 (預設值由 HTML 結構決定，此處為狀態同步)
            const CONFIG = {
                cellType: 'text',
                stripCurrency: true,
                sheetPrefix: '',
                themeColor: '#1E3A8A',
                customFilename: ''
            };

            function init() {
                // DOM 元素初始化
                dropZone = document.getElementById("drop-zone");
                fileInput = document.getElementById("file-input");
                fileListEl = document.getElementById("file-list");
                convertBtn = document.getElementById("convert-btn");
                loadingOverlay = document.getElementById("loading-overlay");
                clearAllBtn = document.getElementById("clear-all-btn");
                fileListTitle = document.getElementById("file-list-title");

                // 設定面板元素
                settingCellType = document.getElementById("setting-cell-type");
                settingStripCurrency = document.getElementById("setting-strip-currency");
                settingSheetPrefix = document.getElementById("setting-sheet-prefix");
                settingThemeColor = document.getElementById("setting-theme-color");
                themeColorLabel = document.getElementById("theme-color-label");
                settingCustomFilename = document.getElementById("setting-custom-filename");

                setupEventListeners();
                setupSettingsListeners();
            }

            function setupEventListeners() {
                // 拖放事件
                dropZone.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    dropZone.classList.add("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.remove("border-gray-200", "bg-[#fafafa]");
                });

                dropZone.addEventListener("dragleave", () => {
                    dropZone.classList.remove("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.add("border-gray-200", "bg-[#fafafa]");
                });

                dropZone.addEventListener("drop", async (e) => {
                    e.preventDefault();
                    dropZone.classList.remove("border-accent", "bg-[#eef2ff]");
                    dropZone.classList.add("border-gray-200", "bg-[#fafafa]");
                    
                    const items = e.dataTransfer.items;
                    if (items) {
                        const fileList = [];
                        const promises = [];
                        for (let i = 0; i < items.length; i++) {
                            const entry = items[i].webkitGetAsEntry();
                            if (entry) {
                                promises.push(traverseEntry(entry, fileList));
                            }
                        }
                        
                        // 如果有項目，顯示載入中
                        if (items.length > 0) {
                            loadingOverlay.style.display = 'flex';
                        }
                        
                        await Promise.all(promises);
                        loadingOverlay.style.display = 'none';
                        handleFiles(fileList);
                    } else {
                        handleFiles(Array.from(e.dataTransfer.files));
                    }
                });

                dropZone.addEventListener("click", () => {
                    fileInput.click();
                });

                fileInput.addEventListener("change", (e) => {
                    handleFiles(Array.from(e.target.files));
                    fileInput.value = "";
                });

                convertBtn.addEventListener("click", handleConvert);
                
                clearAllBtn.addEventListener("click", () => {
                    filesToProcess = [];
                    updateFileList();
                    updateConvertBtn();
                });
            }

            // 遞迴讀取資料夾項目
            async function traverseEntry(entry, fileList) {
                if (entry.isFile) {
                    const file = await new Promise((resolve) => entry.file(resolve));
                    fileList.push(file);
                } else if (entry.isDirectory) {
                    const reader = entry.createReader();
                    const readAllEntries = async () => {
                        const entries = await new Promise((resolve) => reader.readEntries(resolve));
                        if (entries.length > 0) {
                            for (const childEntry of entries) {
                                await traverseEntry(childEntry, fileList);
                            }
                            await readAllEntries();
                        }
                    };
                    await readAllEntries();
                }
            }

            function setupSettingsListeners() {
                // 儲存格格式
                settingCellType.addEventListener("change", (e) => {
                    CONFIG.cellType = e.target.value;
                });

                // 移除金額符號
                settingStripCurrency.addEventListener("change", (e) => {
                    CONFIG.stripCurrency = e.target.checked;
                });

                // 分頁前綴
                settingSheetPrefix.addEventListener("input", (e) => {
                    CONFIG.sheetPrefix = e.target.value.trim();
                });

                // 主題顏色
                settingThemeColor.addEventListener("input", (e) => {
                    const color = e.target.value;
                    themeColorLabel.textContent = color;
                    document.documentElement.style.setProperty('--color-primary', color);
                    // 簡單生成一個較淺的 hover 色
                    document.documentElement.style.setProperty('--color-primary-hover', adjustColorOpacity(color, 0.9));
                    CONFIG.themeColor = color;
                });

                // 自訂檔名
                settingCustomFilename.addEventListener("input", (e) => {
                    CONFIG.customFilename = e.target.value.trim();
                });
            }

            // 輔助函式：調整顏色 (此處僅為 placeholder，實際可使用庫或簡單算法)
            function adjustColorOpacity(hex, opacity) {
                // 這裡簡單回傳原色，僅作示範。若需變亮可實作 HEX 轉 RGB 邏輯
                return hex;
            }

            async function handleFiles(files) {
                let hasZip = false;
                for (let file of files) {
                    if (file.name.toLowerCase().endsWith('.zip')) {
                        hasZip = true;
                        break;
                    }
                }

                if (hasZip) {
                    loadingOverlay.style.display = 'flex';
                    // 讓 UI 更新有機會渲染
                    await new Promise(resolve => setTimeout(resolve, 50));
                }

                try {
                    for (let file of files) {
                        const ext = file.name.split('.').pop().toLowerCase();
                        if (['csv', 'xlsx', 'xls'].includes(ext)) {
                            if (!filesToProcess.some(f => f.name === file.name && f.size === file.size)) {
                                filesToProcess.push(file);
                            }
                        } else if (ext === 'zip') {
                            await processZipFile(file);
                        }
                    }
                } catch (err) {
                    console.error("處理檔案發生錯誤:", err);
                    alert("⚠️ 處理檔案時發生錯誤：" + err.message);
                } finally {
                    loadingOverlay.style.display = 'none';
                    updateFileList();
                    updateConvertBtn();
                }
            }

            async function processZipFile(fileOrBlob) {
                const zip = new JSZip();
                const contents = await zip.loadAsync(fileOrBlob);

                for (const filename of Object.keys(contents.files)) {
                    const zipEntry = contents.files[filename];
                    // Skip directories
                    if (zipEntry.dir) continue;

                    // Skip hidden/macOS files
                    if (filename.includes('__MACOSX/') || filename.split('/').pop().startsWith('.')) continue;

                    const ext = filename.split('.').pop().toLowerCase();
                    if (['csv', 'xlsx', 'xls'].includes(ext)) {
                        const blob = await zipEntry.async("blob");
                        // Extract actual file name without path
                        const actualName = filename.split('/').pop();
                        const extractedFile = new File([blob], actualName, { type: blob.type || "application/octet-stream" });

                        // We check uniqueness based on size and name.
                        if (!filesToProcess.some(f => f.name === extractedFile.name && f.size === extractedFile.size)) {
                            filesToProcess.push(extractedFile);
                        }
                    } else if (ext === 'zip') {
                        // Recursive unzip
                        const blob = await zipEntry.async("blob");
                        // Give it the original file name so the recursive depth logic doesn't break. 
                        await processZipFile(blob);
                    }
                }
            }

            function updateFileList() {
                fileListEl.innerHTML = "";
                
                if (filesToProcess.length > 0) {
                    clearAllBtn.classList.remove("hidden");
                    fileListTitle.classList.remove("hidden");
                } else {
                    clearAllBtn.classList.add("hidden");
                    fileListTitle.classList.add("hidden");
                }

                filesToProcess.forEach((file, index) => {
                    const item = document.createElement("div");
                    item.className = "file-item flex justify-between items-center p-3 mb-2 bg-gray-50 rounded-lg border border-gray-100 animate-fadeIn";
                    item.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <span class="text-xl">📄</span>
                            <div class="flex flex-col min-w-0">
                                <span class="text-sm font-semibold truncate text-gray-700">${file.name}</span>
                                <span class="text-xs text-gray-400">${formatSize(file.size)}</span>
                            </div>
                        </div>
                        <button class="remove-btn text-gray-400 hover:text-danger transition-colors p-1" onclick="app.removeFile(${index})" title="移除檔案">
                            <svg class="w-5 h-5 fill-current" viewBox="0 0 448 512"><path d="M135.2 17.7C135.2 12.1 139.7 7.6 145.3 7.6l157.4 0c5.6 0 10.1 4.5 10.1 10.1l0 7.5L448 25.2c13.3 0 24 10.7 24 24s-10.7 24-24 24l-31 0 0 384c0 35.3-28.7 64-64 64L95.2 512c-35.3 0-64-28.7-64-64l0-384L0 73.2c-13.3 0-24-10.7-24-24s10.7-24 24-24l112.8 0 0-7.5zM23.2 121.2L56.7 121.2 56.7 448c0 8.8 7.2 16 16 16l304 0c8.8 0 16-7.2 16-16l0-326.8 33.5 0c8.8 0 16-7.2 16-16s-7.2-16-16-16l-33.5 0 0-7.5c0-14.1-11.4-25.5-25.5-25.5L145.3 71.9c-14.1 0-25.5 11.4-25.5 25.5l0 7.5-33.5 0c-8.8 0-16 7.2-16 16s7.2 16 16 16z"/></svg>
                        </button>
                    `;
                    fileListEl.appendChild(item);
                });
            }

            function formatSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            function removeFile(index) {
                filesToProcess.splice(index, 1);
                updateFileList();
                updateConvertBtn();
            }

            function updateConvertBtn() {
                const count = filesToProcess.length;
                convertBtn.disabled = count === 0;
                convertBtn.textContent = count > 0 ? `開始轉換 (${count} 個檔案)` : "開始轉換";
            }

            function applyExcelCellFormatting(ws) {
                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cell_address = { c: C, r: R };
                        const cell_ref = XLSX.utils.encode_cell(cell_address);
                        const cell = ws[cell_ref];

                        if (!cell) continue;

                        // 判斷儲存格格式
                        if (CONFIG.cellType === 'text') {
                            cell.t = 's'; // 強制為字串
                        } else if (CONFIG.cellType === 'number') {
                            if (typeof cell.v === 'string' && !isNaN(parseFloat(cell.v.replace(/[$,]/g, '')))) {
                                cell.t = 'n';
                                cell.v = parseFloat(cell.v.replace(/[$,]/g, ''));
                            }
                        }
                        // 'auto' 則保留 SheetJS 預設
                    }
                }
            }

            async function handleConvert() {
                if (filesToProcess.length === 0) return;

                const mode = document.querySelector('input[name="export-mode"]:checked').value;
                const isLargeFile = filesToProcess.some(f => f.size > 50 * 1024 * 1024); // 50MB check

                convertBtn.disabled = true;

                if (isLargeFile) {
                    loadingOverlay.style.display = 'flex';
                } else {
                    convertBtn.textContent = "處理中...";
                }

                // 讓 UI 更新有機會渲染
                await new Promise(resolve => setTimeout(resolve, 100));

                try {
                    if (mode === "individual") {
                        await processIndividual(filesToProcess);
                    } else if (mode === "merged_sheets") {
                        await processMergedSheets(filesToProcess);
                    } else if (mode === "merged_single_sheet") {
                        await processMergedSingleSheet(filesToProcess);
                    }
                    alert("轉換完成！");
                } catch (error) {
                    console.error(error);
                    alert("⚠️ 轉換過程中發生錯誤：" + error.message);
                } finally {
                    convertBtn.disabled = false;
                    updateConvertBtn();
                    loadingOverlay.style.display = 'none';
                }
            }

            function readFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    const ext = file.name.split('.').pop().toLowerCase();

                    if (ext === 'csv') {
                        reader.onload = (e) => resolve({ type: 'csv', data: e.target.result });
                        reader.readAsText(file, "utf-8");
                    } else {
                        reader.onload = (e) => resolve({ type: 'excel', data: e.target.result });
                        reader.readAsArrayBuffer(file);
                    }
                    reader.onerror = (e) => reject(e);
                });
            }

            function parseData(fileData) {
                if (fileData.type === 'csv') {
                    return parseCSV(fileData.data);
                } else {
                    const wb = XLSX.read(fileData.data, { type: 'array' });
                    // 假設讀取第一個 Sheet
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    return XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
                }
            }

            function parseCSV(text) {
                // 更完善的 CSV 解析，支援處理引號內的逗號 (例如 "1,234.00")
                const rows = [];
                const lines = text.split(/\r?\n/);
                for (let line of lines) {
                    if (!line.trim()) continue;
                    const row = [];
                    let inQuotes = false;
                    let currentValue = '';
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            row.push(currentValue.trim().replace(/^"|"$/g, ""));
                            currentValue = '';
                        } else {
                            currentValue += char;
                        }
                    }
                    row.push(currentValue.trim().replace(/^"|"$/g, ""));
                    if (row.some(cell => cell !== "")) {
                        rows.push(row);
                    }
                }
                return rows;
            }

            function cleanData(rows) {
                if (!CONFIG.stripCurrency) return rows;

                return rows.map(row => {
                    return row.map(cell => {
                        if (typeof cell === 'string') {
                            // 移除 $ , + 符號，並處理 .00 或 .000
                            // 例如: "+1,234.00" -> "1234"
                            let cleaned = cell.replace(/[$,+]/g, '');
                            cleaned = cleaned.replace(/\.0+$/, '');
                            return cleaned;
                        }
                        return cell;
                    });
                });
            }

            async function processIndividual(files) {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const fileData = await readFile(file);
                    const rows = await parseData(fileData);
                    const cleanedRows = cleanData(rows);

                    const wb = XLSX.utils.book_new();
                    const ws = XLSX.utils.aoa_to_sheet(cleanedRows);

                    applyExcelCellFormatting(ws);

                    XLSX.utils.book_append_sheet(wb, ws, "Sheet1");

                    let outName = file.name.replace(/\.(csv|xlsx|xls)$/i, ".xlsx");
                    if (CONFIG.customFilename) {
                        outName = `${CONFIG.customFilename}_${i + 1}.xlsx`;
                    }
                    XLSX.writeFile(wb, outName);
                }
            }

            async function processMergedSheets(files) {
                const wb = XLSX.utils.book_new();

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const fileData = await readFile(file);
                    const rows = await parseData(fileData);
                    const cleanedRows = cleanData(rows);

                    const ws = XLSX.utils.aoa_to_sheet(cleanedRows);

                    applyExcelCellFormatting(ws);

                    let sheetName = (i + 1).toString().padStart(2, "0");
                    if (CONFIG.sheetPrefix) {
                        sheetName = CONFIG.sheetPrefix + sheetName;
                    }

                    // Sheet 名稱長度限制 31 字元
                    if (sheetName.length > 31) sheetName = sheetName.substring(0, 31);

                    // 避免重複 Sheet 名稱
                    if (wb.SheetNames.includes(sheetName)) {
                        sheetName = sheetName + "_" + i;
                    }

                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                }
                saveMergedFile(wb);
            }

            async function processMergedSingleSheet(files) {
                const wb = XLSX.utils.book_new();
                let combinedRows = [];
                let firstFileHeader = [];

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const fileData = await readFile(file);
                    const rows = await parseData(fileData);

                    if (rows.length === 0) continue;

                    let dataRows = [];

                    if (i === 0) {
                        // 第一個檔案：保留所有資料包含標題
                        dataRows = rows;
                        firstFileHeader = rows[0]; // 儲存第一筆標題列，以便後續比較
                    } else {
                        // 後續檔案：若有相同標題則移除
                        if (rows.length > 0) {
                            // 判斷方式：若第一列資料的長度、內容與 firstFileHeader 相似
                            if (JSON.stringify(rows[0]) === JSON.stringify(firstFileHeader)) {
                                dataRows = rows.slice(1);
                            } else {
                                dataRows = rows; // 如果標題不同（或無標題），直接合併
                            }
                        }
                    }

                    const cleanedRows = cleanData(dataRows);
                    combinedRows = combinedRows.concat(cleanedRows);
                }

                const ws = XLSX.utils.aoa_to_sheet(combinedRows);
                applyExcelCellFormatting(ws);
                XLSX.utils.book_append_sheet(wb, ws, "MergedData");
                saveMergedFile(wb);
            }

            function saveMergedFile(wb) {
                let filename = "";
                if (CONFIG.customFilename) {
                    filename = `${CONFIG.customFilename}.xlsx`;
                } else {
                    const now = new Date();
                    const month = (now.getMonth() + 1).toString().padStart(2, "0");
                    const date = now.getDate().toString().padStart(2, "0");
                    const hours = now.getHours().toString().padStart(2, "0");
                    const minutes = now.getMinutes().toString().padStart(2, "0");
                    filename = `${month}${date}_${hours}${minutes}合併金流.xlsx`;
                }

                XLSX.writeFile(wb, filename);
            }

            return { init, removeFile };
        })();

        document.addEventListener("DOMContentLoaded", app.init);
    </script>
